version: "3.9"

services:

  # ============================================================
  # INFRAESTRUTURA
  # ============================================================

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: causal_bank
      POSTGRES_USER: agent
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-senha_segura}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U agent -d causal_bank" ]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 3s
      retries: 5

  # ============================================================
  # GÊMEO VPS — Visão Global
  # ============================================================

  vps:
    build:
      context: ..
      dockerfile: docker/Dockerfile.vps
    env_file: ../.env
    environment:
      AGENT_TWIN: vps
      AGENT_ENV: production
      DATABASE_URL: postgresql://agent:${POSTGRES_PASSWORD:-senha_segura}@postgres:5432/causal_bank
      REDIS_URL: redis://redis:6379/0
    ports:
      - "8000:8000" # FastAPI
      - "8765:8765" # WebSocket sync
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ============================================================
  # GÊMEO LOCAL — Visão Íntima
  # ============================================================

  local:
    build:
      context: ..
      dockerfile: docker/Dockerfile.local
    env_file: ../.env
    environment:
      AGENT_TWIN: local
      AGENT_ENV: production
      DATABASE_URL: postgresql://agent:${POSTGRES_PASSWORD:-senha_segura}@postgres:5432/causal_bank
    depends_on:
      postgres:
        condition: service_healthy

  # ============================================================
  # SANDBOX — Evolução de Código Isolada
  # Sem acesso à rede, banco de produção, ou capital real
  # ============================================================

  sandbox:
    build:
      context: ..
      dockerfile: docker/Dockerfile.dev
    environment:
      AGENT_ENV: sandbox
      DATABASE_URL: sqlite:///tmp/sandbox_test.db
    network_mode: "none" # ISOLAMENTO TOTAL — sem rede
    tmpfs:
      - /tmp # Tudo é efêmero no sandbox
    profiles:
      - sandbox # Só sobe quando explicitamente solicitado

  # ============================================================
  # DEV — Ambiente de Desenvolvimento
  # ============================================================

  dev:
    build:
      context: ..
      dockerfile: docker/Dockerfile.dev
    env_file: ../.env
    environment:
      AGENT_ENV: development
      DATABASE_URL: sqlite:///tmp/dev_test.db
    volumes:
      - ..:/app
    profiles:
      - dev

volumes:
  postgres_data:
